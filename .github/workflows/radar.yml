name: Radar Diario Oficial

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t radar-diario .

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: docker run --rm -e GEMINI_API_KEY -e EMAIL_USER -e EMAIL_PASSWORD -e EMAIL_DESTINATARIO radar-diario
